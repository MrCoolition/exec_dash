[auth]
redirect_uri = "https://YOUR-APP.streamlit.app/oauth2callback"
cookie_secret = "REPLACE_WITH_LONG_RANDOM_SECRET"
provider = "auth0"

[auth.auth0]
client_id = "YOUR_AUTH0_CLIENT_ID"
client_secret = "YOUR_AUTH0_CLIENT_SECRET"
server_metadata_url = "https://YOUR_DOMAIN.us.auth0.com/.well-known/openid-configuration"

[azure_devops]
organization = "YOUR_ADO_ORG"
pat = "YOUR_ORG_SCOPED_PAT"
api_version = "7.1"

[aiven]
ca_pem = """-----BEGIN CERTIFICATE-----
PASTE_AIVEN_PROJECT_CA_CERT_HERE
-----END CERTIFICATE-----"""

[database]
url = "postgresql+psycopg://USER:PASSWORD@HOST:PORT/DBNAME"
sslmode = "verify-ca"
