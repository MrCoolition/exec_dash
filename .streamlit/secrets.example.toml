[auth]
redirect_uri = "https://exec-dash.streamlit.app/oauth2callback"
cookie_secret = "<LONG_RANDOM_SECRET>"

[auth.auth0]
client_id = "<AUTH0_CLIENT_ID>"
client_secret = "<AUTH0_CLIENT_SECRET>"
server_metadata_url = "https://<AUTH0_TENANT_DOMAIN>/.well-known/openid-configuration"

[database]
AIVEN_HOST = "your-aiven-host"
AIVEN_PORT = "5432"
AIVEN_USER = "your-db-user"
AIVEN_PASSWORD = "your-db-password"
AIVEN_DB = "your-db-name"

[azure_devops]
organization = "YOUR_ADO_ORG"
pat = "YOUR_ORG_SCOPED_PAT"
api_version = "7.1"
