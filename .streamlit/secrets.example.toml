[auth]
provider = "auth0"
redirect_uri = "https://YOUR-APP.streamlit.app/"
cookie_secret = "REPLACE_WITH_LONG_RANDOM_SECRET"

[auth0]
domain = "YOUR_DOMAIN.us.auth0.com"
client_id = "YOUR_AUTH0_CLIENT_ID"
client_secret = "YOUR_AUTH0_CLIENT_SECRET"

[azure_devops]
organization = "YOUR_ADO_ORG"
pat = "YOUR_ORG_SCOPED_PAT"
api_version = "7.1"

[aiven]
ca_pem = """-----BEGIN CERTIFICATE-----
PASTE_AIVEN_PROJECT_CA_CERT_HERE
-----END CERTIFICATE-----"""

[database]
# Option 1 (explicit URL)
# url = "postgresql+psycopg://USER:PASSWORD@HOST:PORT/DBNAME"
# sslmode = "verify-ca"

# Option 2 (Aiven credentials, URL composed automatically)
AIVEN_HOST = "YOUR_AIVEN_HOST"
AIVEN_PORT = "5432"
AIVEN_USER = "YOUR_AIVEN_USER"
AIVEN_PASSWORD = "YOUR_AIVEN_PASSWORD"
AIVEN_DB = "YOUR_AIVEN_DB"
sslmode = "require"
